<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code-Clash Battle Test</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .section {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
            backdrop-filter: blur(10px);
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
            font-size: 16px;
        }
        button:hover {
            background: #45a049;
        }
        .status {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            font-family: monospace;
        }
        .connected { color: #4CAF50; }
        .disconnected { color: #f44336; }
        .battle-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }
        .player-card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .hp-bar {
            background: #333;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        .hp-fill {
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            height: 100%;
            transition: width 0.3s ease;
        }
        textarea {
            width: 100%;
            height: 150px;
            background: rgba(0,0,0,0.3);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 10px;
            font-family: 'Courier New', monospace;
            resize: vertical;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ Code-Clash Battle Test</h1>
        
        <div class="section">
            <h2>🔌 Connection Status</h2>
            <button onclick="connect()">Connect to Server</button>
            <button onclick="disconnect()">Disconnect</button>
            <button onclick="authenticate()">Authenticate</button>
            <div id="connectionStatus" class="status">Not connected</div>
        </div>

        <div class="section">
            <h2>🎮 Battle Controls</h2>
            <button onclick="joinQueue()">Join Queue</button>
            <button onclick="leaveQueue()">Leave Queue</button>
            <button onclick="submitCode()">Submit Code</button>
            <div id="battleStatus" class="status">Not in battle</div>
        </div>

        <div class="section">
            <div class="battle-info">
                <div class="player-card">
                    <h3>👤 You</h3>
                    <div class="hp-bar">
                        <div class="hp-fill" id="myHp" style="width: 100%"></div>
                    </div>
                    <div id="myStats">HP: 500/500</div>
                </div>
                <div class="player-card">
                    <h3>🤖 Opponent</h3>
                    <div class="hp-bar">
                        <div class="hp-fill" id="opponentHp" style="width: 100%"></div>
                    </div>
                    <div id="opponentStats">HP: 500/500</div>
                </div>
            </div>
        </div>

        <div class="section">
            <h3>💻 Code Editor</h3>
            <textarea id="codeEditor" placeholder="// Write your JavaScript code here
function solution(input) {
    // Your solution here
    return input;
}">function solution(input) {
    // Example solution for Two Sum
    const nums = JSON.parse(input);
    const target = nums[1];
    const numbers = nums[0];
    
    for (let i = 0; i < numbers.length; i++) {
        for (let j = i + 1; j < numbers.length; j++) {
            if (numbers[i] + numbers[j] === target) {
                return JSON.stringify([i, j]);
            }
        }
    }
    return JSON.stringify([]);
}</textarea>
        </div>

        <div class="section">
            <h3>📜 Battle Log</h3>
            <div id="battleLog" class="status" style="max-height: 300px; overflow-y: auto;">Waiting for battle...</div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3001';
        let socket = null;
        let currentToken = localStorage.getItem('token') || '';
        let battleState = null;

        function log(message) {
            const battleLog = document.getElementById('battleLog');
            const timestamp = new Date().toLocaleTimeString();
            battleLog.innerHTML = `[${timestamp}] ${message}<br>` + battleLog.innerHTML;
        }

        function updateConnectionStatus(status, isConnected) {
            const element = document.getElementById('connectionStatus');
            element.textContent = status;
            element.className = `status ${isConnected ? 'connected' : 'disconnected'}`;
        }

        function connect() {
            socket = io(API_BASE);
            
            socket.on('connect', () => {
                updateConnectionStatus('✅ Connected to server', true);
                log('Connected to Code-Clash Arena');
            });

            socket.on('disconnect', () => {
                updateConnectionStatus('❌ Disconnected from server', false);
                log('Disconnected from server');
            });

            socket.on('authenticated', (data) => {
                log(`✅ Authenticated as ${data.username}`);
                document.getElementById('battleStatus').textContent = 'Ready for battle';
            });

            socket.on('queue-joined', () => {
                log('🎮 Joined matchmaking queue');
                document.getElementById('battleStatus').textContent = 'In queue...';
            });

            socket.on('queue-left', () => {
                log('🚪 Left matchmaking queue');
                document.getElementById('battleStatus').textContent = 'Not in queue';
            });

            socket.on('match-found', (data) => {
                log(`⚔️ Match found! Battle ID: ${data.matchId}`);
                battleState = data;
                document.getElementById('battleStatus').textContent = 'In battle!';
            });

            socket.on('battle-start', (data) => {
                log(`🎯 Battle started! Problem: ${data.problem.title}`);
                updateBattleState(data);
            });

            socket.on('submission-result', (data) => {
                log(`📊 Submission result: ${data.passedTests}/${data.totalTests} tests passed, ${data.damageDealt} damage dealt`);
                updateBattleState(data.battleState);
            });

            socket.on('battle-end', (data) => {
                log(`🏆 Battle ended! Winner: ${data.winner}`);
                document.getElementById('battleStatus').textContent = 'Battle ended';
            });

            socket.on('error', (error) => {
                log(`❌ Error: ${error}`);
            });
        }

        function disconnect() {
            if (socket) {
                socket.disconnect();
                socket = null;
                updateConnectionStatus('❌ Disconnected', false);
            }
        }

        async function authenticate() {
            if (!socket) {
                log('❌ Connect to server first');
                return;
            }

            if (!currentToken) {
                // Try to login with test credentials
                try {
                    const response = await fetch(`${API_BASE}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: 'test@example.com', password: 'password123' })
                    });
                    const data = await response.json();
                    if (response.ok) {
                        currentToken = data.token;
                        localStorage.setItem('token', currentToken);
                        log('🔐 Logged in successfully');
                    } else {
                        log(`❌ Login failed: ${data.error}`);
                        return;
                    }
                } catch (error) {
                    log(`❌ Login error: ${error.message}`);
                    return;
                }
            }

            socket.emit('authenticate', { token: currentToken });
        }

        function joinQueue() {
            if (socket) {
                socket.emit('join-queue');
            } else {
                log('❌ Connect to server first');
            }
        }

        function leaveQueue() {
            if (socket) {
                socket.emit('leave-queue');
            } else {
                log('❌ Connect to server first');
            }
        }

        function submitCode() {
            if (!battleState) {
                log('❌ Not in battle');
                return;
            }

            const code = document.getElementById('codeEditor').value;
            socket.emit('submit-code', {
                matchId: battleState.matchId,
                code: code,
                language: 'javascript'
            });
            log('📤 Code submitted!');
        }

        function updateBattleState(state) {
            if (state && state.players) {
                const myId = socket.userId || 'test';
                const myPlayer = state.players[myId] || state.players[Object.keys(state.players)[0]];
                const opponentId = Object.keys(state.players).find(id => id !== myId) || Object.keys(state.players)[1];
                const opponentPlayer = state.players[opponentId];

                if (myPlayer) {
                    const hpPercent = (myPlayer.hp / myPlayer.maxHp) * 100;
                    document.getElementById('myHp').style.width = `${hpPercent}%`;
                    document.getElementById('myStats').textContent = `HP: ${myPlayer.hp}/${myPlayer.maxHp}`;
                }

                if (opponentPlayer) {
                    const hpPercent = (opponentPlayer.hp / opponentPlayer.maxHp) * 100;
                    document.getElementById('opponentHp').style.width = `${hpPercent}%`;
                    document.getElementById('opponentStats').textContent = `HP: ${opponentPlayer.hp}/${opponentPlayer.maxHp}`;
                }
            }
        }

        // Auto-connect on page load
        window.onload = () => {
            log('🚀 Code-Clash Battle Test Ready');
        };
    </script>
</body>
</html>
