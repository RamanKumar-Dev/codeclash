<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code-Clash Arena - MVP Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 3em;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .section {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
            backdrop-filter: blur(10px);
        }
        .form-group {
            margin: 15px 0;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, button, textarea {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            background: #4CAF50;
            color: white;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #45a049;
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .response {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
        }
        .leaderboard {
            display: grid;
            gap: 10px;
        }
        .leaderboard-item {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .rank {
            font-size: 1.5em;
            font-weight: bold;
            margin-right: 15px;
        }
        .problem-card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 8px;
            margin: 10px 0;
        }
        .status {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
        }
        .success { background: #4CAF50; }
        .error { background: #f44336; }
        .info { background: #2196F3; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Code-Clash Arena</h1>
            <p>Full MVP Test Suite - PostgreSQL + Prisma + Socket.io</p>
        </div>

        <div class="section">
            <h2>🔐 Authentication</h2>
            <div class="form-group">
                <label>Username:</label>
                <input type="text" id="username" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="email" placeholder="Enter email">
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" id="password" placeholder="Enter password">
            </div>
            <button onclick="register()">Register</button>
            <button onclick="login()">Login</button>
            <button onclick="getProfile()">Get Profile</button>
            <div id="authResponse" class="response"></div>
        </div>

        <div class="section">
            <h2>🏆 Leaderboard</h2>
            <button onclick="getLeaderboard()">Refresh Leaderboard</button>
            <div id="leaderboardResponse" class="response"></div>
        </div>

        <div class="section">
            <h2>📚 Problems</h2>
            <button onclick="getRandomProblem()">Get Random Problem</button>
            <div id="problemResponse" class="response"></div>
        </div>

        <div class="section">
            <h2>🔌 API Status</h2>
            <button onclick="checkAPIStatus()">Check API Status</button>
            <div id="statusResponse" class="response"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3001';
        let currentToken = localStorage.getItem('token') || '';

        function updateResponse(elementId, content, isError = false) {
            const element = document.getElementById(elementId);
            element.textContent = content;
            element.style.background = isError ? 'rgba(244, 67, 54, 0.3)' : 'rgba(0,0,0,0.3)';
        }

        async function register() {
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await response.json();
                
                if (response.ok) {
                    currentToken = data.token;
                    localStorage.setItem('token', currentToken);
                    updateResponse('authResponse', `✅ Registration Successful!\n\n${JSON.stringify(data, null, 2)}`);
                } else {
                    updateResponse('authResponse', `❌ Registration Failed: ${data.error}`, true);
                }
            } catch (error) {
                updateResponse('authResponse', `❌ Network Error: ${error.message}`, true);
            }
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                
                if (response.ok) {
                    currentToken = data.token;
                    localStorage.setItem('token', currentToken);
                    updateResponse('authResponse', `✅ Login Successful!\n\n${JSON.stringify(data, null, 2)}`);
                } else {
                    updateResponse('authResponse', `❌ Login Failed: ${data.error}`, true);
                }
            } catch (error) {
                updateResponse('authResponse', `❌ Network Error: ${error.message}`, true);
            }
        }

        async function getProfile() {
            try {
                const response = await fetch(`${API_BASE}/profile/me`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                const data = await response.json();
                
                if (response.ok) {
                    updateResponse('authResponse', `✅ Profile Data:\n\n${JSON.stringify(data, null, 2)}`);
                } else {
                    updateResponse('authResponse', `❌ Profile Failed: ${data.error}`, true);
                }
            } catch (error) {
                updateResponse('authResponse', `❌ Network Error: ${error.message}`, true);
            }
        }

        async function getLeaderboard() {
            try {
                const response = await fetch(`${API_BASE}/leaderboard`);
                const data = await response.json();
                
                if (response.ok) {
                    const leaderboardHTML = data.map((user, index) => `
                        <div class="leaderboard-item">
                            <div style="display: flex; align-items: center;">
                                <span class="rank">#${index + 1}</span>
                                <div>
                                    <strong>${user.username}</strong><br>
                                    <small>ELO: ${user.elo} | Wins: ${user.wins} | Losses: ${user.losses} | Win Rate: ${user.winRate}%</small>
                                </div>
                            </div>
                        </div>
                    `).join('');
                    document.getElementById('leaderboardResponse').innerHTML = `<div class="leaderboard">${leaderboardHTML}</div>`;
                } else {
                    updateResponse('leaderboardResponse', `❌ Failed: ${data.error}`, true);
                }
            } catch (error) {
                updateResponse('leaderboardResponse', `❌ Network Error: ${error.message}`, true);
            }
        }

        async function getRandomProblem() {
            try {
                const response = await fetch(`${API_BASE}/api/problems/random`);
                const data = await response.json();
                
                if (response.ok) {
                    const problemHTML = `
                        <div class="problem-card">
                            <h3>${data.title}</h3>
                            <p><strong>Difficulty:</strong> ${data.difficulty}</p>
                            <p><strong>Time Limit:</strong> ${data.timeLimitMs}ms</p>
                            <p><strong>Memory Limit:</strong> ${data.memoryLimitMb}MB</p>
                            <p><strong>Tags:</strong> ${data.tags.join(', ')}</p>
                            <hr>
                            <p><strong>Description:</strong></p>
                            <p>${data.description}</p>
                            <hr>
                            <p><strong>Test Cases:</strong></p>
                            <pre>${JSON.stringify(data.testCases, null, 2)}</pre>
                        </div>
                    `;
                    document.getElementById('problemResponse').innerHTML = problemHTML;
                } else {
                    updateResponse('problemResponse', `❌ Failed: ${data.error}`, true);
                }
            } catch (error) {
                updateResponse('problemResponse', `❌ Network Error: ${error.message}`, true);
            }
        }

        async function checkAPIStatus() {
            try {
                const response = await fetch(`${API_BASE}/`);
                const data = await response.json();
                
                if (response.ok) {
                    updateResponse('statusResponse', `✅ API Status:\n\n${JSON.stringify(data, null, 2)}`);
                } else {
                    updateResponse('statusResponse', `❌ API Down: ${data.error}`, true);
                }
            } catch (error) {
                updateResponse('statusResponse', `❌ Network Error: ${error.message}`, true);
            }
        }

        // Auto-load some data on page load
        window.onload = () => {
            checkAPIStatus();
            getLeaderboard();
        };
    </script>
</body>
</html>
