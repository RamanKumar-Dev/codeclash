name: Deploy Code-Clash

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ── Test ─────────────────────────────────────────────────────────────────────
  test:
    name: Test & Build Verification
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm install

      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate
        env:
          DATABASE_URL: file:./prisma/dev.db

      - name: TypeScript check
        working-directory: server
        run: npx tsc --noEmit
        env:
          DATABASE_URL: file:./prisma/dev.db

      - name: Build server
        working-directory: server
        run: npm run build
        env:
          DATABASE_URL: file:./prisma/dev.db

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  # ── Security Scan ─────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit server
        working-directory: server
        run: npm install && npm audit --audit-level=critical || true

      - name: Audit frontend
        working-directory: frontend
        run: npm install && npm audit --audit-level=critical || true

  # ── Rollback placeholder (no-op for local dev setup) ──────────────────────────
  rollback:
    name: Rollback (no-op)
    runs-on: ubuntu-latest
    needs: test
    if: failure() && github.ref == 'refs/heads/main'

    steps:
      - name: No-op rollback
        run: echo "ℹ️ No deployment target configured — rollback skipped for local dev setup."
